<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gantt visual harness</title>
    <style>
      html, body { margin: 0; background: #14161c; }
      #chart { width: 1200px; height: 640px; }
    </style>
  </head>
  <body>
    <div id="chart"></div>
    <script type="module">
      import * as echarts from 'https://esm.sh/echarts@5.6.0';
      import { Gantt } from '../../dist/graphs/gantt/index.js';

      // A branching DAG with per-task durations and a reconverging node, so bars
      // have real widths and dependency arrows overlap in the enrichment column.
      const series = [
        ['a_b_d', 65],
        ['a_c_d', 50],
        ['a_b_e_d', 125],
        ['a_c_e_d', 110],
        ['a', 8],
        ['b', 45],
        ['c', 30],
        ['e', 60],
        ['d', 12],
      ];
      const dataSeries = series.map(([name, value]) => ({
        name,
        fields: [
          { type: 'time', values: [0] },
          { type: 'number', values: [value] },
        ],
      }));
      const container = document.getElementById('chart');
      const chart = echarts.init(container, null, { renderer: 'canvas' });
      const context = {
        grafana: { replaceVariables: (s) => (s === '$percentile' ? '95' : s) },
        panel: {
          width: 1200,
          height: 640,
          data: { series: dataSeries },
          chart: { getDom: () => container, setOption: (o) => chart.setOption(o) },
        },
      };
      const option = Gantt.render(context, {});
      chart.setOption(option);

      const bars = (option.series[1].data || []).map((d) => d.value);
      const arrows = (option.series[0].data || []).map((d) => d.value);
      window.__gantt = { barCount: bars.length, arrowCount: arrows.length, arrows, ready: true };
    </script>
  </body>
</html>
